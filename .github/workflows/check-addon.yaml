name: Check Addon Build
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  check-addon-changes:
    runs-on: ubuntu-latest
    outputs:
      changedAddons: ${{ steps.filter.outputs.changes }}
      changedChangelogFiles: ${{ steps.changed-files.outputs.changelogs_files }}
    steps:

    - name: ↩️ Checkout
      uses: actions/checkout@v4

    - name: 📂 Detect changed addons
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: .github/paths-filter.yml

    - name: 📂 Detect changed files
      uses: dorny/paths-filter@v3
      id: changed-files
      with:
        list-files: csv
        filters: |
          changelogs:
            - '**/CHANGELOG.md'

  check-build:
    name: Test addon build
    if: ${{ needs.check-addon-changes.outputs.changedAddons != '[]' }}
    runs-on: ubuntu-24.04-arm
    needs: check-addon-changes
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.check-addon-changes.outputs.changedAddons) }}
    steps:

      - name: ↩️ Checkout
        uses: actions/checkout@v4

      - name: ℹ️ Gather addon info
        id: information
        uses: frenck/action-addon-information@v1
        with:
          path: "./${{ matrix.addon }}/"

      - name: 🔧 Prepare build variables
        id: prep
        shell: bash
        run: |
          image="${{ steps.information.outputs.image }}"
          echo "image=${image/\{arch\}/aarch64}" >> "$GITHUB_OUTPUT"
          build_from="$(yq -r '.build_from.aarch64 // ""' ${{ steps.information.outputs.build }})"
          echo "build_from=${build_from}" >> "$GITHUB_OUTPUT"

      - name: 💿 Test build addon (aarch64)
        if: ${{ steps.information.outputs.aarch64 == 'true' }}
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: aarch64
          image: ${{ steps.prep.outputs.image }}
          image-tags: ${{ steps.information.outputs.version }}
          version: ${{ steps.information.outputs.version }}
          context: ${{ matrix.addon }}
          build-args: |
            BUILD_FROM=${{ steps.prep.outputs.build_from }}
          push: "false"
          cosign: "false"
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
